<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narlo Chat - Premium Messaging App</title>
    <!-- Google Font (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Socket.io client library -->
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        :root {
            /* Premium Dark Theme Palette */
            --bg-dark: #090d16;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-input: rgba(10, 15, 30, 0.8);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --sidebar-width: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #070a13 0%, #0d0b21 50%, #060912 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 16px;
        }

        /* Card container holding entire app */
        .app-window {
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Views (Auth vs Main Dashboard) */
        .view {
            width: 100%;
            height: 100%;
            display: none;
        }

        .view.active {
            display: flex;
        }

        /* ---------------- AUTH VIEW ---------------- */
        .auth-view {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 50%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-card h2 {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #a5b4fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .auth-card p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(to right, var(--primary), #818cf8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            margin-top: 10px;
        }

        .auth-btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-toggle span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        .auth-toggle span:hover {
            text-decoration: underline;
        }

        /* ---------------- DASHBOARD VIEW ---------------- */
        .dashboard-view {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Design */
        .sidebar {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(10, 15, 30, 0.4);
        }

        /* User Profile Header in Sidebar */
        .profile-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .user-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .user-details p {
            font-size: 0.75rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            color: #fb7185;
            background: rgba(251, 113, 133, 0.1);
        }

        /* Sidebar Tabs Selectors */
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 15, 30, 0.2);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Sidebar Search / Create action */
        .sidebar-actions {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .create-group-btn {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .create-group-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Scrollable List Container (Users or Groups) */
        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.03);
        }

        .list-item.active {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.15);
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-details h5 {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .item-details p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Online / Offline status dot indicators */
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #475569;
            border: 2px solid var(--bg-dark);
        }

        .status-indicator.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* ---------------- CHAT WINDOW PANEL ---------------- */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 7, 12, 0.2);
        }

        /* Default Placeholder Screen when no active conversation is selected */
        .chat-placeholder {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            gap: 16px;
        }

        .chat-placeholder svg {
            width: 64px;
            height: 64px;
            color: rgba(99, 102, 241, 0.3);
        }

        /* Main active chat layout */
        .chat-active {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-active.show {
            display: flex;
        }

        /* Chat Window Header */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 15, 30, 0.2);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-text h4 {
            font-size: 1rem;
            font-weight: 600;
        }

        .chat-header-text p {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* Scrollable Message Box */
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-bubble {
            max-width: 65%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble.received {
            align-self: flex-start;
        }

        .message-bubble.sent {
            align-self: flex-end;
        }

        /* Message details banner inside chat */
        .msg-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .msg-text {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.92rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-bubble.received .msg-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.sent .msg-text {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        /* Typing indicator text */
        .typing-indicator-box {
            font-size: 0.75rem;
            color: var(--primary);
            padding: 8px 24px;
            font-weight: 500;
            min-height: 30px;
            display: flex;
            align-items: center;
        }

        /* Footer Input Toolbar */
        .chat-input-bar {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: rgba(10, 15, 30, 0.2);
        }

        .chat-input-bar input {
            flex-grow: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .chat-input-bar input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .send-btn:hover {
            background: var(--primary-hover);
        }

        /* ---------------- OVERLAY MODAL (Create Group) ---------------- */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            width: 100%;
            max-width: 440px;
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .modal-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .members-checkbox-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--bg-input);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .cancel-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="app-window">

        <!-- ---------------- AUTHENTICATION VIEW ---------------- -->
        <div id="authView" class="view active auth-view">
            <div class="auth-card">
                <h2 id="authTitle">Narlo Chat</h2>
                <p class="subtitle" id="authSubtitle">Join the premium real-time messaging network</p>
                
                <form id="authForm" onsubmit="handleAuthSubmit(event)">
                    <div class="form-group" id="nameGroup">
                        <label for="regName">Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group">
                        <label for="authEmail">Email Address</label>
                        <input type="email" id="authEmail" required placeholder="name@domain.com">
                    </div>

                    <div class="form-group">
                        <label for="authPassword">Password</label>
                        <input type="password" id="authPassword" required placeholder="••••••••">
                    </div>

                    <button type="submit" id="authSubmitBtn" class="auth-btn">Create Account</button>
                </form>

                <div class="auth-toggle" id="authToggleText">
                    Already have an account? <span onclick="toggleAuthMode()">Sign In</span>
                </div>
            </div>
        </div>

        <!-- ---------------- CHAT DASHBOARD VIEW ---------------- -->
        <div id="dashboardView" class="view dashboard-view">
            <!-- Sidebar Panel -->
            <div class="sidebar">
                <!-- User Profile Section -->
                <div class="profile-header">
                    <div class="user-info">
                        <div class="avatar" id="myAvatar">-</div>
                        <div class="user-details">
                            <h4 id="myUsername">User Name</h4>
                            <p><span style="width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;"></span> Active</p>
                        </div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()" title="Logout">
                        <!-- Logout Icon -->
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>

                <!-- Tab Selectors -->
                <div class="sidebar-tabs">
                    <button id="usersTabBtn" class="tab-btn active" onclick="switchSidebarTab('users')">Direct Messages</button>
                    <button id="groupsTabBtn" class="tab-btn" onclick="switchSidebarTab('groups')">Groups</button>
                </div>

                <!-- Sidebar Actions -->
                <div class="sidebar-actions">
                    <span id="tabTitle" style="font-size: 0.82rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Chats</span>
                    <button id="createRoomBtn" class="create-group-btn" style="display: none;" onclick="openCreateGroupModal()">+ Create Group</button>
                </div>

                <!-- List Section (Populated dynamically) -->
                <div id="listContainer" class="list-container">
                    <!-- Users/Groups items will be injected here -->
                </div>
            </div>

            <!-- Chat Area Panel -->
            <div class="chat-container">
                <!-- Empty Placeholder -->
                <div id="chatPlaceholder" class="chat-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <p>Select a contact or join a group to start messaging</p>
                </div>

                <!-- Chat Room Window (Visible when conversation is selected) -->
                <div id="chatActive" class="chat-active">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <div class="avatar" id="chatTitleAvatar">?</div>
                            <div class="chat-header-text">
                                <h4 id="chatTitleName">Select chat</h4>
                                <p id="chatTitleStatus">Offline</p>
                            </div>
                        </div>
                    </div>

                    <!-- Scrollable Messages Container -->
                    <div class="chat-messages" id="chatMessages">
                        <!-- Dynamic chat messages go here -->
                    </div>

                    <!-- Typing indicator status notice -->
                    <div class="typing-indicator-box" id="typingIndicator"></div>

                    <!-- Footer Input Message Toolbar -->
                    <div class="chat-input-bar">
                        <input type="text" id="messageInput" placeholder="Write a message..." oninput="handleTypingNotification()">
                        <button class="send-btn" onclick="submitMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ---------------- CREATE GROUP OVERLAY MODAL ---------------- -->
    <div id="createGroupModal" class="modal">
        <div class="modal-card">
            <h3>Create Chat Group</h3>
            <form onsubmit="handleCreateGroupSubmit(event)">
                <div class="form-group">
                    <label for="groupName">Group Name</label>
                    <input type="text" id="groupName" required placeholder="Development Team">
                </div>
                <div class="form-group">
                    <label for="groupDesc">Description</label>
                    <input type="text" id="groupDesc" placeholder="Discussion about code changes">
                </div>
                <div class="form-group">
                    <label>Select Members</label>
                    <div class="members-checkbox-list" id="modalUserChecklist">
                        <!-- Dynamic checkboxes of other users -->
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn" onclick="closeCreateGroupModal()">Cancel</button>
                    <button type="submit" class="auth-btn" style="width: auto; margin-top: 0; padding: 10px 24px;">Create Group</button>
                </div>
            </form>
        </div>
    </div>    <!-- ---------------- APPLICATION SCRIPT ---------------- -->
    <script>
        const SERVER_URL = "https://narlo-backend-soket.onrender.com";
        
        let socket = null;
        let token = localStorage.getItem("narlo_token");
        let currentUser = null;
        
        // App states
        let isLoginMode = false; // Sign up mode by default
        let currentTab = "users"; // active sidebar tab: "users" or "groups"
        let activeChat = null; // Currently selected conversation ({ id, name, type })
        let typingTimeout = null;
        let isCurrentlyTyping = false;

        // Cache elements
        const authView = document.getElementById("authView");
        const dashboardView = document.getElementById("dashboardView");
        const authTitle = document.getElementById("authTitle");
        const authSubtitle = document.getElementById("authSubtitle");
        const nameGroup = document.getElementById("nameGroup");
        const regNameInput = document.getElementById("regName");
        const emailInput = document.getElementById("authEmail");
        const passwordInput = document.getElementById("authPassword");
        const authSubmitBtn = document.getElementById("authSubmitBtn");
        const authToggleText = document.getElementById("authToggleText");

        const listContainer = document.getElementById("listContainer");
        const usersTabBtn = document.getElementById("usersTabBtn");
        const groupsTabBtn = document.getElementById("groupsTabBtn");
        const tabTitle = document.getElementById("tabTitle");
        const createRoomBtn = document.getElementById("createRoomBtn");

        const chatPlaceholder = document.getElementById("chatPlaceholder");
        const chatActive = document.getElementById("chatActive");
        const chatTitleAvatar = document.getElementById("chatTitleAvatar");
        const chatTitleName = document.getElementById("chatTitleName");
        const chatTitleStatus = document.getElementById("chatTitleStatus");
        const chatMessages = document.getElementById("chatMessages");
        const messageInput = document.getElementById("messageInput");
        const typingIndicator = document.getElementById("typingIndicator");

        const myAvatar = document.getElementById("myAvatar");
        const myUsername = document.getElementById("myUsername");

        const createGroupModal = document.getElementById("createGroupModal");
        const modalUserChecklist = document.getElementById("modalUserChecklist");

        // Local cache collections
        let usersList = [];
        let groupsList = [];
        let activeTypingUsers = new Set();

        // Establish the Socket connection on page load
        initSocket();

        // On Page Load: Try token auto-login via sockets
        window.addEventListener("DOMContentLoaded", () => {
            if (token) {
                // Wait for socket to connect before authenticating
                if (socket.connected) {
                    autoLogin();
                } else {
                    socket.once("connect", autoLogin);
                }
            }
        });

        // Toggle Auth View Mode
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.textContent = "Sign In";
                authSubtitle.textContent = "Welcome back! Enter credentials to join chat.";
                nameGroup.style.display = "none";
                regNameInput.required = false;
                authSubmitBtn.textContent = "Login";
                authToggleText.innerHTML = "Don't have an account? <span onclick='toggleAuthMode()'>Create Account</span>";
            } else {
                authTitle.textContent = "Narlo Chat";
                authSubtitle.textContent = "Join the premium real-time messaging network";
                nameGroup.style.display = "block";
                regNameInput.required = true;
                authSubmitBtn.textContent = "Create Account";
                authToggleText.innerHTML = "Already have an account? <span onclick='toggleAuthMode()'>Sign In</span>";
            }
        }

        // Auto-login using socket authentication event
        function autoLogin() {
            console.log("Auto-authenticating user token...");
            socket.emit("authenticate", { token }, (response) => {
                if (response.success) {
                    setupDashboard(response.user);
                } else {
                    console.warn("Auto Login Failed:", response.message);
                    handleLogout();
                }
            });
        }

        // Handles Signup / Login Form Submit over socket connection
        function handleAuthSubmit(event) {
            event.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const name = regNameInput.value.trim();

            const eventName = isLoginMode ? "login" : "signup";
            const payload = isLoginMode ? { email, password } : { name, email, password };

            authSubmitBtn.disabled = true;
            authSubmitBtn.textContent = isLoginMode ? "Logging in..." : "Creating...";

            // Emit the auth event over socket
            socket.emit(eventName, payload, (response) => {
                authSubmitBtn.disabled = false;
                authSubmitBtn.textContent = isLoginMode ? "Login" : "Create Account";

                if (response.success) {
                    localStorage.setItem("narlo_token", response.token);
                    token = response.token;
                    setupDashboard(response.user);
                } else {
                    alert(response.message);
                }
            });
        }

        // Initialize user session on dashboard
        function setupDashboard(user) {
            currentUser = user;
            
            // Switch views
            authView.classList.remove("active");
            dashboardView.classList.add("active");

            // Setup Profile Header info
            myUsername.textContent = user.name;
            myAvatar.textContent = user.name.charAt(0).toUpperCase();

            // Fetch listings via sockets
            loadUsers();
            loadGroups();
        }

        // Handles logout
        function handleLogout() {
            localStorage.removeItem("narlo_token");
            token = null;
            currentUser = null;

            // Reset views
            dashboardView.classList.remove("active");
            authView.classList.add("active");
            
            // Reset chat state
            activeChat = null;
            chatActive.classList.remove("show");
            chatPlaceholder.style.display = "flex";
            
            // Reset input values
            emailInput.value = "";
            passwordInput.value = "";
            regNameInput.value = "";
        }

        // ---------------- SOCKET-DRIVEN ACTIONS & LOADERS ----------------

        // Fetch user listing over socket
        function loadUsers() {
            if (!socket) return;
            socket.emit("get_users", (response) => {
                if (response.success) {
                    usersList = response.users;
                    if (currentTab === "users") renderUsersList();
                } else {
                    console.error("Error loading users:", response.message);
                }
            });
        }

        // Fetch groups listing over socket
        function loadGroups() {
            if (!socket) return;
            socket.emit("get_rooms", (response) => {
                if (response.success) {
                    groupsList = response.rooms;
                    if (currentTab === "groups") renderGroupsList();
                } else {
                    console.error("Error loading groups:", response.message);
                }
            });
        }

        // Switch active tab in sidebar
        function switchSidebarTab(tab) {
            currentTab = tab;
            usersTabBtn.classList.toggle("active", tab === "users");
            groupsTabBtn.classList.toggle("active", tab === "groups");

            if (tab === "users") {
                tabTitle.textContent = "Direct Messages";
                createRoomBtn.style.display = "none";
                renderUsersList();
            } else {
                tabTitle.textContent = "Groups Channels";
                createRoomBtn.style.display = "block";
                renderGroupsList();
            }
        }

        // Renders User Direct Messages list
        function renderUsersList() {
            listContainer.innerHTML = "";
            if (usersList.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">No contacts found</p>`;
                return;
            }

            usersList.forEach(user => {
                const isActive = activeChat && activeChat.type === "private" && activeChat.id === user._id;
                
                const item = document.createElement("div");
                item.className = `list-item ${isActive ? 'active' : ''}`;
                item.onclick = () => selectConversation(user._id, user.name, "private");

                const avatarLetter = user.name.charAt(0).toUpperCase();
                const statusClass = user.isOnline ? "online" : "";
                const lastSeenText = user.isOnline ? "Online" : "Offline";

                item.innerHTML = `
                    <div class="item-meta">
                        <div class="avatar">${avatarLetter}</div>
                        <div class="item-details">
                            <h5>${user.name}</h5>
                            <p>${lastSeenText}</p>
                        </div>
                    </div>
                    <div class="status-indicator ${statusClass}"></div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Renders Group Rooms list
        function renderGroupsList() {
            listContainer.innerHTML = "";
            if (groupsList.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">No groups. Create one!</p>`;
                return;
            }

            groupsList.forEach(room => {
                const isActive = activeChat && activeChat.type === "group" && activeChat.id === room._id;

                const item = document.createElement("div");
                item.className = `list-item ${isActive ? 'active' : ''}`;
                item.onclick = () => selectConversation(room._id, room.name, "group");

                item.innerHTML = `
                    <div class="item-meta">
                        <div class="avatar" style="background: linear-gradient(135deg, var(--accent), #f43f5e)">#</div>
                        <div class="item-details">
                            <h5>${room.name}</h5>
                            <p>${room.members.length} members</p>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Choose user or group to initiate conversation
        function selectConversation(id, name, type) {
            // Leave previous room if group
            if (activeChat && activeChat.type === "group") {
                socket.emit("leave_room", activeChat.id);
            }

            activeChat = { id, name, type };
            activeTypingUsers.clear();
            renderActiveTypingNotice();

            // Highlight selected in list
            if (currentTab === "users") renderUsersList();
            else renderGroupsList();

            // Toggle screens
            chatPlaceholder.style.display = "none";
            chatActive.classList.add("show");

            // Setup Conversation Header Info
            chatTitleName.textContent = name;
            chatTitleAvatar.textContent = type === "private" ? name.charAt(0).toUpperCase() : "#";
            chatTitleAvatar.style.background = type === "private" ? "linear-gradient(135deg, var(--primary), var(--accent))" : "linear-gradient(135deg, var(--accent), #f43f5e)";

            if (type === "private") {
                const contact = usersList.find(u => u._id === id);
                chatTitleStatus.textContent = contact && contact.isOnline ? "Online" : "Offline";
            } else {
                const group = groupsList.find(g => g._id === id);
                chatTitleStatus.textContent = group ? `${group.members.length} Members joined` : "Group Chat";
                
                // Join Group Socket Room Channel
                socket.emit("join_room", id);
            }

            // Clear chat feed & Fetch DB history
            chatMessages.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">Loading history...</div>`;
            
            // Define fetch payload and target socket event
            const eventName = type === "private" ? "get_private_history" : "get_room_history";
            const payload = type === "private" ? { otherUserId: id } : { roomId: id };

            socket.emit(eventName, payload, (response) => {
                if (response.success) {
                    chatMessages.innerHTML = "";
                    if (response.messages.length === 0) {
                        chatMessages.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">No messages yet. Say Hello!</div>`;
                    } else {
                        response.messages.forEach(msg => {
                            displayMessage(msg);
                        });
                    }
                } else {
                    console.error("Failed to load history:", response.message);
                    chatMessages.innerHTML = `<div style="text-align:center; color:var(--accent); font-size:0.85rem; margin-top:20px;">Failed to load chat history.</div>`;
                }
            });
        }

        // Print Message Bubble in Active Chat Feed
        function displayMessage(msg) {
            // Remove empty screen banner
            if (chatMessages.children.length === 1 && chatMessages.firstChild.nodeType === Node.ELEMENT_NODE && chatMessages.firstChild.textContent.includes("No messages")) {
                chatMessages.innerHTML = "";
            }

            const isMe = msg.senderId === currentUser._id;
            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${isMe ? 'sent' : 'received'}`;

            const timeFormatted = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            bubble.innerHTML = `
                <div class="msg-info">
                    <strong>${isMe ? "You" : msg.senderName}</strong>
                    <span>${timeFormatted}</span>
                </div>
                <div class="msg-text">${escapeHTML(msg.text)}</div>
            `;

            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Submits/Sends message typed in the input bar
        function submitMessage() {
            const text = messageInput.value.trim();
            if (!text || !activeChat || !socket) return;

            // Clear active typing indicator status
            isCurrentlyTyping = false;
            socket.emit("typing_status", {
                recipientId: activeChat.type === "private" ? activeChat.id : null,
                roomId: activeChat.type === "group" ? activeChat.id : null,
                isTyping: false
            });

            const eventName = activeChat.type === "private" ? "send_private_message" : "send_group_message";
            const payload = activeChat.type === "private" 
                ? { recipientId: activeChat.id, text } 
                : { roomId: activeChat.id, text };

            socket.emit(eventName, payload);
            messageInput.value = "";
            messageInput.focus();
        }

        // Triggers Send Message when Enter Key is hit inside input
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submitMessage();
        });

        // Broadcast active typing indicator state
        function handleTypingNotification() {
            if (!socket || !activeChat) return;

            if (!isCurrentlyTyping) {
                isCurrentlyTyping = true;
                socket.emit("typing_status", {
                    recipientId: activeChat.type === "private" ? activeChat.id : null,
                    roomId: activeChat.type === "group" ? activeChat.id : null,
                    isTyping: true
                });
            }

            // Clear previous typing timeout and set a new one
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isCurrentlyTyping = false;
                socket.emit("typing_status", {
                    recipientId: activeChat.type === "private" ? activeChat.id : null,
                    roomId: activeChat.type === "group" ? activeChat.id : null,
                    isTyping: false
                });
            }, 2000); // Stop indicator after 2s of inactivity
        }

        // Renders active typing notice
        function renderActiveTypingNotice() {
            if (activeTypingUsers.size > 0) {
                const names = Array.from(activeTypingUsers).map(id => {
                    const u = usersList.find(user => user._id === id);
                    return u ? u.name : "Someone";
                }).join(", ");
                typingIndicator.innerHTML = `<i>${names} is typing...</i>`;
            } else {
                typingIndicator.innerHTML = "";
            }
        }

        // ---------------- MODAL GROUP CREATION ACTIONS ----------------

        function openCreateGroupModal() {
            createGroupModal.style.display = "flex";
            modalUserChecklist.innerHTML = "";

            if (usersList.length === 0) {
                modalUserChecklist.innerHTML = `<p style="color:var(--text-muted); font-size:0.8rem;">No contacts available to add.</p>`;
                return;
            }

            usersList.forEach(user => {
                const checkItem = document.createElement("div");
                checkItem.className = "checkbox-item";
                checkItem.innerHTML = `
                    <input type="checkbox" id="userCheck_${user._id}" value="${user._id}">
                    <label for="userCheck_${user._id}">${user.name}</label>
                `;
                modalUserChecklist.appendChild(checkItem);
            });
        }

        function closeCreateGroupModal() {
            createGroupModal.style.display = "none";
        }

        // Submit Action to Create Room via Socket event
        function handleCreateGroupSubmit(event) {
            event.preventDefault();

            const name = document.getElementById("groupName").value.trim();
            const description = document.getElementById("groupDesc").value.trim();
            
            // Gather checked member user IDs
            const checkboxes = modalUserChecklist.querySelectorAll("input[type='checkbox']:checked");
            const members = Array.from(checkboxes).map(chk => chk.value);

            socket.emit("create_room", { name, description, members }, (response) => {
                if (response.success) {
                    closeCreateGroupModal();
                    // Reload groups listing and select newly created group
                    loadGroups();
                    selectConversation(response.room._id, response.room.name, "group");
                    document.getElementById("groupName").value = "";
                    document.getElementById("groupDesc").value = "";
                } else {
                    alert(response.message);
                }
            });
        }

        // ---------------- SOCKET REAL-TIME LISTENER SETUP ----------------

        function initSocket() {
            // Establish Connection
            socket = io(SERVER_URL);

            // Wrap emit to log outgoing events
            const originalEmit = socket.emit;
            socket.emit = function (eventName, ...args) {
                const serializableArgs = args.filter(arg => typeof arg !== 'function');
                console.log(`📤 [Socket Web Client - Outgoing] Event: '${eventName}' | Payload:`, JSON.stringify(serializableArgs));
                originalEmit.apply(socket, [eventName, ...args]);
            };

            // Wrap on to log incoming events
            const originalOn = socket.on;
            socket.on = function (eventName, callback) {
                originalOn.call(socket, eventName, function (...args) {
                    console.log(`📥 [Socket Web Client - Incoming] Event: '${eventName}' | Payload:`, JSON.stringify(args));
                    callback.apply(this, args);
                });
            };

            socket.on("connect", () => {
                console.log("⚡ Real-time Socket Connected (ID:", socket.id, ")");
            });

            // LISTENER: user_status (Handles Online/Offline changes)
            socket.on("user_status", (data) => {
                const { userId, isOnline } = data;
                
                // Update local users status
                const userIndex = usersList.findIndex(u => u._id === userId);
                if (userIndex !== -1) {
                    usersList[userIndex].isOnline = isOnline;
                    
                    // Refresh sidebar DOM list
                    if (currentTab === "users") renderUsersList();

                    // If active chat is this user, refresh status subtitle
                    if (activeChat && activeChat.type === "private" && activeChat.id === userId) {
                        chatTitleStatus.textContent = isOnline ? "Online" : "Offline";
                    }
                }
            });

            // LISTENER: room_added (Fires when another user adds current user to a group)
            socket.on("room_added", (newRoom) => {
                groupsList.unshift(newRoom);
                if (currentTab === "groups") renderGroupsList();
            });

            // LISTENER: receive_private_message
            socket.on("receive_private_message", (msg) => {
                // Render bubble only if current active chat window is set with the sender / recipient conversation
                const isRelevant = activeChat && activeChat.type === "private" && 
                    (activeChat.id === msg.senderId || activeChat.id === msg.recipientId);

                if (isRelevant) {
                    displayMessage(msg);
                }
            });

            // LISTENER: receive_group_message
            socket.on("receive_group_message", (msg) => {
                // Render bubble only if current active chat is set with this room
                const isRelevant = activeChat && activeChat.type === "group" && activeChat.id === msg.roomId;

                if (isRelevant) {
                    displayMessage(msg);
                }
            });

            // LISTENER: typing_status
            socket.on("typing_status", (data) => {
                const { senderId, roomId, isTyping } = data;

                // Handle Private Chat Typing Notification
                if (activeChat && activeChat.type === "private" && !roomId && activeChat.id === senderId) {
                    if (isTyping) activeTypingUsers.add(senderId);
                    else activeTypingUsers.delete(senderId);
                    renderActiveTypingNotice();
                }

                // Handle Group Chat Typing Notification
                if (activeChat && activeChat.type === "group" && roomId && activeChat.id === roomId) {
                    if (isTyping) activeTypingUsers.add(senderId);
                    else activeTypingUsers.delete(senderId);
                    renderActiveTypingNotice();
                }
            });
        }

        // HTML escaping utility
        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
